<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f9fc" />
  <title>LariantAi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* (tutto il CSS Liquid Glass che avevi prima – identico) */
    :root { --glass-bg: rgba(255,255,255,0.30); --glass-border: rgba(255,255,255,0.85); --text-primary: #111827; --accent: #111827; }
    /* ... resto del CSS identico al precedente ... */
  </style>
</head>
<body>
  <!-- SVG Liquid Glass -->
  <svg class="svg-filters" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <defs>
      <filter id="liquid"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="7"/></filter>
    </defs>
  </svg>

  <div class="container">
    <!-- HEADER + UPLOAD + PREVIEW + BUTTON (identici) -->
    <!-- ... (stessi elementi di prima) ... -->
  </div>

  <script>
    // ================== INSERISCI QUI LA TUA CHIAVE ==================
    const GEMINI_API_KEY = "AIzaSyDiwVkes5hAkQLKJgObfybnbj_MAT6nRRg";   // ← CAMBIA QUI

    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    let currentFile = null;
    let isAnalyzing = false;

    // (triggerUpload, preview, ecc. identici)

    async function analyzeImage() {
      if (!currentFile || isAnalyzing) return;
      isAnalyzing = true;
      const btn = document.getElementById('btn-analyze');
      btn.textContent = "Analisi con Gemini AI...";
      btn.disabled = true;

      const base64 = await fileToBase64(currentFile);

      const prompt = `Analizza questa foto di un prodotto (scarpa, vestito o accessorio). 
      Rispondi SOLO con JSON valido:
      {
        "brand": "...",
        "modello": "...",
        "colorway": "...",
        "tipo": "...",
        "confidence": 0.95
      }`;

      try {
        const res = await fetch(GEMINI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: prompt },
                { inline_data: { mime_type: "image/jpeg", data: base64 } }
              ]
            }]
          })
        });

        const data = await res.json();
        const text = data.candidates[0].content.parts[0].text;
        const risultato = JSON.parse(text.replace(/```json|```/g, ""));

        renderRealResults(risultato);
        showToast(`✅ Riconosciuto: ${risultato.brand} ${risultato.modello}`);

      } catch (e) {
        showToast("❌ Errore Gemini – controlla la chiave API");
      }

      isAnalyzing = false;
      btn.textContent = "Analizza di nuovo";
      btn.disabled = false;
    }

    function fileToBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    }

    function renderRealResults(r) {
      const q = encodeURIComponent(`${r.brand} ${r.modello} ${r.colorway || ''}`);
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div class="result-card glass">
          <div style="display:flex;gap:18px">
            <div style="font-size:52px">👟</div>
            <div>
              <div style="font-size:18px;font-weight:600">${r.brand} ${r.modello}</div>
              <div style="font-size:14px;color:#4b5563">${r.colorway || ''} – ${r.tipo || 'Prodotto'}</div>
            </div>
          </div>
          <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
            <a href="https://www.google.com/search?tbm=shop&q=${q}&hl=it" target="_blank" class="shop-link">🔎 Google Shopping – Prezzo più basso</a>
            <a href="https://www.amazon.it/s?k=${q}" target="_blank" class="shop-link">🛒 Amazon.it</a>
            <a href="https://www.zalando.it/catalog/?q=${q}" target="_blank" class="shop-link">🟠 Zalando</a>
          </div>
        </div>
      `;
      resultsDiv.classList.add('visible');
    }

    // (showToast e altre funzioni identiche)
  </script>
</body>
</html>
