<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f9fc" />
  <title>LariantAi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.30);
      --glass-border: rgba(255,255,255,0.85);
      --text-primary: #111827;
      --accent: #111827;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fc;
      background-image: 
        radial-gradient(ellipse 70% 50% at 15% 15%, rgba(220,232,255,0.65) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 85% 85%, rgba(232,220,255,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(220,255,232,0.35) 0%, transparent 70%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text-primary);
    }
    .container { width: 100%; max-width: 380px; }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(31,38,135,0.08), inset 0 4px 20px rgba(255,255,255,0.35);
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(160deg, rgba(255,255,255,0.90) 0%, rgba(255,255,255,0.25) 30%, transparent 60%);
      pointer-events: none;
    }
    .glass::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(255,255,255,0.25),
                  inset 1px 0 0 rgba(255,255,255,0.65), inset -1px 0 0 rgba(255,255,255,0.35);
      pointer-events: none;
    }
    .glass > * { position: relative; z-index: 3; }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { font-size: 28px; font-weight: 600; letter-spacing: -0.8px; }
    .subtitle { font-size: 13px; color: #666666; margin-top: 4px; }

    .upload-area { padding: 52px 28px; text-align: center; cursor: pointer; }
    .upload-icon { width: 72px; height: 72px; margin: 0 auto 20px; background: rgba(255,255,255,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .upload-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .upload-subtitle { font-size: 14px; color: #4b5563; line-height: 1.5; }

    .preview-container { display: none; border-radius: 24px; overflow: hidden; margin-bottom: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .preview-container img { width: 100%; display: block; }
    .change-photo { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); color: #111; font-size: 13px; padding: 7px 22px; border-radius: 999px; box-shadow: 0 4px 15px rgba(0,0,0,0.12); cursor: pointer; }

    .btn-analyze { width: 100%; background: var(--accent); color: white; border: none; padding: 18px 24px; font-size: 17px; font-weight: 600; border-radius: 20px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .btn-analyze:active { transform: scale(0.96); }
    .btn-analyze:disabled { background: #e5e5e5; color: #999; }

    .results { display: none; margin-top: 32px; }
    .results.visible { display: block; }
    .result-card { background: var(--glass-bg); backdrop-filter: blur(22px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white; padding: 12px 26px; border-radius: 999px;
      font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); opacity: 0; transition: all 0.35s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-12px); }
  </style>
</head>
<body>
  <svg class="svg-filters" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <defs>
      <filter id="liquid"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="7"/></filter>
    </defs>
  </svg>

  <div class="container">
    <div class="header">
      <div class="logo">LariantAi</div>
      <div class="subtitle">Trova il prodotto al prezzo più basso</div>
    </div>

    <div class="glass" id="upload-card" onclick="triggerUpload()">
      <div class="upload-area">
        <div class="upload-icon">📸</div>
        <div class="upload-title">Fotografa o carica il capo</div>
        <div class="upload-subtitle">Scatta una foto o scegli dalla galleria.<br>Funziona su scarpe, vestiti e accessori.</div>
      </div>
    </div>

    <div id="preview-container" class="preview-container glass">
      <img id="preview-img" src="" alt="Preview" />
      <div class="change-photo" onclick="triggerUpload()">Cambia foto</div>
    </div>

    <button id="btn-analyze" class="glass btn-analyze" onclick="analyzeImage()" disabled>
      Analizza con AI
    </button>

    <div id="results" class="results"></div>
  </div>

  <div id="toast" class="toast"></div>

  <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" />

  <script>
    // ================== INSERISCI QUI LA TUA CHIAVE GEMINI ==================
    const GEMINI_API_KEY = "AIzaSyDiwVkes5hAkQLKJgObfybnbj_MAT6nRRg";   // ← SOSTITUISCI CON LA TUA CHIAVE

    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    let currentFile = null;
    let isAnalyzing = false;

    function triggerUpload() {
      if (isAnalyzing) return;
      document.getElementById('file-input').click();
    }

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      currentFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('preview-img').src = ev.target.result;
        document.getElementById('upload-card').style.display = 'none';
        document.getElementById('preview-container').style.display = 'block';
        document.getElementById('btn-analyze').disabled = false;
        showToast('📸 Foto caricata');
      };
      reader.readAsDataURL(file);
    });

    async function analyzeImage() {
      if (!currentFile || isAnalyzing) return;
      isAnalyzing = true;
      const btn = document.getElementById('btn-analyze');
      btn.textContent = "Analisi con Gemini AI...";
      btn.disabled = true;

      const base64 = await fileToBase64(currentFile);

      const prompt = `Analizza questa foto di un prodotto (scarpa, vestito o accessorio). Rispondi SOLO con JSON valido:
      {
        "brand": "es. Nike",
        "modello": "es. Alphafly 3",
        "colorway": "es. Laser Orange / Citron Pulse / Volt",
        "tipo": "es. Scarpe running maratona",
        "confidence": 0.95
      }`;

      try {
        const res = await fetch(GEMINI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await res.json();
        const text = data.candidates[0].content.parts[0].text;
        const risultato = JSON.parse(text.replace(/```json|```/g, ""));

        renderRealResults(risultato);
        showToast(`✅ Riconosciuto: ${risultato.brand} ${risultato.modello}`);
      } catch (e) {
        showToast("❌ Errore Gemini – controlla la chiave API");
      }

      isAnalyzing = false;
      btn.textContent = "Analizza di nuovo";
      btn.disabled = false;
    }

    function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    }

    function renderRealResults(r) {
      const q = encodeURIComponent(`${r.brand} ${r.modello} ${r.colorway || ''}`);
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div class="result-card glass">
          <div style="display:flex;gap:18px;align-items:center;margin-bottom:20px">
            <div style="font-size:52px">👟</div>
            <div>
              <div style="font-size:18px;font-weight:600">${r.brand} ${r.modello}</div>
              <div style="font-size:14px;color:#4b5563">${r.colorway || ''} – ${r.tipo || 'Prodotto'}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <a href="https://www.google.com/search?tbm=shop&q=${q}&hl=it" target="_blank" style="display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.5);border-radius:16px;text-decoration:none;color:inherit">
              <span style="font-size:24px">🔎</span>
              <span style="flex:1;font-weight:500">Google Shopping</span>
              <span style="font-weight:600">Prezzo più basso</span>
            </a>
            <a href="https://www.amazon.it/s?k=${q}" target="_blank" style="display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.5);border-radius:16px;text-decoration:none;color:inherit">
              <span style="font-size:24px">🛒</span>
              <span style="flex:1;font-weight:500">Amazon.it</span>
              <span style="font-weight:600">da €265</span>
            </a>
            <a href="https://www.zalando.it/catalog/?q=${q}" target="_blank" style="display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.5);border-radius:16px;text-decoration:none;color:inherit">
              <span style="font-size:24px">🟠</span>
              <span style="flex:1;font-weight:500">Zalando</span>
              <span style="font-weight:600">da €269</span>
            </a>
          </div>
        </div>
      `;
      resultsDiv.classList.add('visible');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    showToast('👋 Benvenuto in LariantAi');
  </script>
</body>
</html>
